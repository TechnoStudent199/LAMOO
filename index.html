<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hey... 🐾</title>
  <style>
    body {
      background-color: #fce4ec;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      max-width: 350px;
      width: 90%;
    }
    img {
      width: 170px;
      border-radius: 18px;
      margin-bottom: 15px;
    }
    h2 {
      color: #d81b60;
      font-size: 1.5rem;
      margin-bottom: 10px;
    }
    p {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 22px;
      line-height: 1.4;
    }
    .btn-group {
      display: flex;
      justify-content: center;
      gap: 15px;
    }
    .btn {
      padding: 12px 24px;
      border-radius: 25px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.95rem;
      text-decoration: none;
      transition: all 0.2s ease;
    }
    .btn-yes {
      background-color: #ff4081;
      color: white;
    }
    .btn-no {
      background-color: #4caf50;
      color: white;
    }
    .btn:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Z2bzBxZ2x3Zmd1ZndhdnA3ejB4eXZyb2NycWVrdGJmd241Z296ciZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/L9543L40I4JfG/giphy.gif" alt="Asking Cat">
    
    <h2>Are you mad at me? 🥺</h2>
    <p>Honest answer batana... aaj ka roast thoda zyaada ho gaya tha kya?</p>

    <div class="btn-group">
      <a href="yes.html" class="btn btn-yes">Haan thoda sa 😾</a>
      <a href="no.html" class="btn btn-no">Nahi re 😸</a>
    </div>
  </div>

</body>
</html>

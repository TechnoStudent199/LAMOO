<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quick Qs 🐾</title>
  <style>
    body {
      background: #fdf2f8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      max-width: 360px;
      width: 100%;
      text-align: center;
    }
    img {
      width: 180px;
      border-radius: 18px;
      margin-bottom: 15px;
    }
    h2 {
      color: #f43f5e;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    p {
      color: #64748b;
      font-size: 0.95rem;
      margin-bottom: 24px;
      line-height: 1.4;
    }
    .btn-group {
      display: flex;
      gap: 12px;
    }
    .btn {
      flex: 1;
      padding: 12px 16px;
      border-radius: 16px;
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    .btn-yes {
      background: #f43f5e;
      color: white;
    }
    .btn-no {
      background: #10b981;
      color: white;
    }
    .btn:active {
      transform: scale(0.96);
    }
  </style>
</head>
<body>

  <div class="card">
    <!-- Shy Cat GIF -->
    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Z2bzBxZ2x3Zmd1ZndhdnA3ejB4eXZyb2NycWVrdGJmd241Z296ciZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/L9543L40I4JfG/giphy.gif" alt="Asking Cat">
    
    <h2>Are you mad at me? 🥺</h2>
    <p>Be honest... aaj ka roast lowkey zyaada ho gaya tha kya?</p>

    <div class="btn-group">
      <a href="yes.html" class="btn btn-yes">Haan thoda 😾</a>
      <a href="no.html" class="btn btn-no">Nahi re chill 😸</a>
    </div>
  </div>

</body>
</html>
